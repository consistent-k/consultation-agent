services:
    frontend:
        build:
            context: .
            dockerfile: apps/frontend/Dockerfile
        ports:
            - '127.0.0.1:8080:80'
        depends_on:
            - backend

    backend:
        build:
            context: .
            dockerfile: apps/backend/Dockerfile
        ports:
            - '127.0.0.1:3001:3001'
        environment:
            - NODE_ENV=production
            - PORT=3001
            - LLM_API_KEY=${LLM_API_KEY}
            - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
            - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}

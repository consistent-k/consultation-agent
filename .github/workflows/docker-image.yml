name: Docker Image

on:
    workflow_dispatch:
    release:
        types: [published]

jobs:
    build-backend:
        runs-on: ubuntu-latest

        steps:
            - name: 检查代码
              uses: actions/checkout@v6

            - name: Clean Docker auth
              run: |
                  docker logout || true
                  rm -rf ~/.docker/config.json || true

            - name: 登录Dockerhub
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: 前置DockerBuild
              uses: docker/setup-buildx-action@v4
              with:
                  driver-opts: image=moby/buildkit:latest

            - name: 设置QEMU
              uses: docker/setup-qemu-action@v4

            - name: 生成镜像标签
              id: meta-backend
              uses: docker/metadata-action@v6
              with:
                  images: |
                      consistentlee/consultation-agent-backend
                  tags: |
                      type=raw,value=latest
                      type=ref,event=tag

            - name: 构建并推送Backend镜像
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ./apps/backend/Dockerfile
                  target: backend
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: ${{ steps.meta-backend.outputs.tags }}
                  labels: ${{ steps.meta-backend.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    build-frontend:
        runs-on: ubuntu-latest
        needs: build-backend

        steps:
            - name: 检查代码
              uses: actions/checkout@v6

            - name: Clean Docker auth
              run: |
                  docker logout || true
                  rm -rf ~/.docker/config.json || true

            - name: 登录Dockerhub
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: 前置DockerBuild
              uses: docker/setup-buildx-action@v4
              with:
                  driver-opts: image=moby/buildkit:latest

            - name: 设置QEMU
              uses: docker/setup-qemu-action@v4

            - name: 生成镜像标签
              id: meta-frontend
              uses: docker/metadata-action@v6
              with:
                  images: |
                      consistentlee/consultation-agent-frontend
                  tags: |
                      type=raw,value=latest
                      type=ref,event=tag

            - name: 构建并推送Frontend镜像
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ./apps/frontend/Dockerfile
                  target: frontend
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: ${{ steps.meta-frontend.outputs.tags }}
                  labels: ${{ steps.meta-frontend.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
